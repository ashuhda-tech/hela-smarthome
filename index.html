<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hela SmartHome | Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #1c2023; --card: #2e4052; --text-muted: #91a1ab;
            --text: #ffffff; --accent: #9a8b51; --danger: #ef4444;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Cabeçalho Reorganizado */
        .top-container { width: 100%; max-width: 1200px; text-align: center; }
        .controls-wrapper { display: flex; align-items: center; justify-content: center; gap: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px solid #3e474f; }
        
        #species-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #000; display: none; }
        select { background: var(--bg); color: var(--accent); border: 1px solid var(--accent); padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; min-width: 300px; }

        /* Grid e Cards */
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; width: 100%; max-width: 1200px; }
        .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 10px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); }
        
        .label { font-size: 0.7em; color: var(--text-muted); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 2.2em; font-weight: bold; display: block; margin: 5px 0; }
        .sub-data { font-size: 0.85em; color: var(--accent); margin-top: 10px; line-height: 1.6; }

        /* Modal Expansivo */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; padding: 40px 0; }
        .modal-content { background: var(--bg); width: 90%; max-width: 1000px; margin: auto; border-radius: 15px; padding: 30px; border: 1px solid var(--accent); }
        .chart-container { margin-bottom: 40px; height: 300px; }
        
        .close-btn { background: var(--accent); color: var(--bg); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="top-container">
        <h1 style="margin: 0;">HELA <span style="color:var(--accent)">SMARTHOME</span></h1>
        
        <div class="controls-wrapper">
            <img id="species-img" src="" alt="Especie">
            <select id="speciesSelect" onchange="updateSpeciesView()">
                <option value="">Carregando lista de espécies...</option>
            </select>
        </div>
    </div>

    <div class="main-layout">
        <div class="sensor-grid">
            <div class="card" onclick="openHistory(1, 'Temperatura Ar')">
                <span class="label">Temperatura Ar</span>
                <span class="value" id="f1">--</span>
            </div>
            <div class="card" onclick="openHistory(2, 'Umidade Ar')">
                <span class="label">Umidade Ar</span>
                <span class="value" id="f2">--</span>
            </div>

            <div class="card" style="grid-column: span 2; border-left: 5px solid var(--accent);" onclick="openBioCharts()">
                <span class="label" style="color: var(--accent)">Bio-Dados Históricos (Hela)</span>
                <div class="sub-data">
                    <div>🥩 Alimentação: <strong id="last-feed">--</strong> | <strong id="last-feed-w">--</strong></div>
                    <div>⚖️ Pesagem: <strong id="last-weight-d">--</strong> | <strong id="last-weight">--</strong></div>
                    <div>🐍 Última Troca: <strong id="last-shed">--</strong></div>
                </div>
                <div style="font-size: 0.7em; margin-top: 15px; color: var(--text-muted);">CLIQUE PARA EXPANDIR SÉRIES HISTÓRICAS</div>
            </div>
            
            <div class="card" onclick="openHistory(5, 'CO2')">
                <span class="label">CO2</span>
                <span class="value" id="f5">--</span>
            </div>
        </div>

        <div style="background: #000; border-radius: 10px; height: 400px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);">
            <span style="color: #475569; font-size: 0.8em;">VIDEO STREAM OFFLINE</span>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">FECHAR</button>
            <h2 id="modal-title" style="color:var(--accent); margin-bottom: 30px;">Analytics</h2>
            
            <div id="charts-area">
                </div>
        </div>
    </div>

    <script>
        const urlHela = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPIj53K6S1tfQLEssozqH55iGwWS0fHNft4fcf8CSzkmU0ZBqdSCYI8m30T_rkhg/pub?gid=1486357435&single=true&output=csv';
        const urlEspecies = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPIj53K6S1tfQLEssozqH55iGwWS0fHNft4fcf8CSzkmU0ZBqdSCYI8m30T_rkhg/pub?gid=1184403882&single=true&output=csv';
        
        let dbEspecies = [];
        let dbHela = [];

        async function init() {
            await Promise.all([fetchEspecies(), fetchHela()]);
            updateThingSpeak();
        }

        async function fetchEspecies() {
            const res = await fetch(urlEspecies);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(','));
            const select = document.getElementById('speciesSelect');
            select.innerHTML = "";

            rows.slice(1).forEach(c => {
                if(c[0]) {
                    dbEspecies.push({ common: c[0], scientific: c[1], img: c[7] });
                    let opt = document.createElement('option');
                    opt.value = c[0];
                    opt.text = `${c[0]} | ${c[1]}`;
                    select.appendChild(opt);
                }
            });
            updateSpeciesView();
        }

        function updateSpeciesView() {
            const val = document.getElementById('speciesSelect').value;
            const item = dbEspecies.find(e => e.common === val);
            const imgEl = document.getElementById('species-img');
            if(item && item.img) {
                imgEl.src = item.img;
                imgEl.style.display = "block";
            }
        }

        async function fetchHela() {
            const res = await fetch(urlHela);
            const text = await res.text();
            // Suporte a vírgula ou ponto-e-vírgula
            const sep = text.includes(';') ? ';' : ',';
            dbHela = text.split(/\r?\n/).map(line => line.split(sep)).filter(r => r.length > 1);
            
            // Lógica de "Últimos Eventos" para o Card
            const getLatest = (evt) => dbHela.filter(r => r[1] === evt).pop();

            const alimentacao = getLatest("Alimentação");
            const pesagem = getLatest("Pesagem");
            const troca = getLatest("Troca de Pele");

            if(alimentacao) {
                document.getElementById('last-feed').innerText = alimentacao[0];
                document.getElementById('last-feed-w').innerText = alimentacao[2] + "g";
            }
            if(pesagem) {
                document.getElementById('last-weight-d').innerText = pesagem[0];
                document.getElementById('last-weight').innerText = pesagem[2] + "g";
            }
            if(troca) {
                document.getElementById('last-shed').innerText = troca[0];
            }
        }

        function openBioCharts() {
            document.getElementById('modal-title').innerText = "Análise Histórica: Hela";
            const area = document.getElementById('charts-area');
            area.innerHTML = `
                <div class="chart-container"><canvas id="chartFeed"></canvas></div>
                <div class="chart-container"><canvas id="chartWeight"></canvas></div>
                <div class="chart-container"><canvas id="chartShed"></canvas></div>
            `;
            document.getElementById('modal').style.display = 'block';

            renderChart("chartFeed", "Alimentação (Peso da Presa - g)", "Alimentação", "#9a8b51");
            renderChart("chartWeight", "Evolução de Peso (g)", "Pesagem", "#3b82f6");
            renderShedChart();
        }

        function renderChart(canvasId, label, filter, color) {
            const data = dbHela.filter(r => r[1] === filter);
            new Chart(document.getElementById(canvasId), {
                type: 'line',
                data: {
                    labels: data.map(r => r[0]),
                    datasets: [{ label: label, data: data.map(r => r[2]), borderColor: color, tension: 0.3, fill: false }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false }, x: { ticks: { color: '#91a1ab' } } } }
            });
        }

        function renderShedChart() {
            const data = dbHela.filter(r => r[1] === "Troca de Pele");
            let intervals = [];
            let labels = [];

            for(let i = 1; i < data.length; i++) {
                const d1 = new Date(data[i-1][0].split('/').reverse().join('-'));
                const d2 = new Date(data[i][0].split('/').reverse().join('-'));
                const diff = Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
                intervals.push(diff);
                labels.push(data[i][0]);
            }

            new Chart(document.getElementById("chartShed"), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: "Intervalo entre Trocas (Dias)", data: intervals, backgroundColor: "#ef4444" }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        async function updateThingSpeak() {
            const res = await fetch(`https://api.thingspeak.com/channels/3063889/feeds.json?results=1`);
            const data = await res.json();
            const f = data.feeds[0];
            document.getElementById('f1').innerText = parseFloat(f.field1).toFixed(1) + "°C";
            document.getElementById('f2').innerText = parseFloat(f.field2).toFixed(1) + "%";
            document.getElementById('f5').innerText = Math.round(f.field5) + "ppm";
        }

        function openHistory(field, title) {
            document.getElementById('modal-title').innerText = "Histórico: " + title;
            document.getElementById('charts-area').innerHTML = `<iframe src="https://thingspeak.com/channels/3063889/charts/${field}?bgcolor=%231c2023&color=%239a8b51&dynamic=true&results=60&type=line" style="width:100%; height:400px; border:none;"></iframe>`;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        init();
    </script>
</body>
</html>
